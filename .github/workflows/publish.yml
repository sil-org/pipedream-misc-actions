name: Publish Pipedream Action
on:
  push:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
        # Test against all LTS versions of Node (Active, Maintenance).
        # See <https://nodejs.org/en/about/releases/>

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Clean-install NPM dependencies
        run: npm ci

      - name: Test
        run: npm test
        env:
          TEST_GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.TEST_GOOGLE_SERVICE_ACCOUNT_KEY }}
          TEST_GOOGLE_SHEET_ID: ${{ secrets.TEST_GOOGLE_SHEET_ID }}

  publish:
    name: Publish
    needs: test
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Clean-install NPM dependencies
        run: npm ci

      - name: Install Pipedream CLI
        run: curl https://cli.pipedream.com/install | sh

      - name: Configure Pipedream CLI
        run: |
          mkdir -p $HOME/.config/pipedream
          echo "api_key = ${{ secrets.PIPEDREAM_API_KEY }}" > $HOME/.config/pipedream/config
          echo "org_id = ${{ secrets.PIPEDREAM_WORKSPACE_ID }}" >> $HOME/.config/pipedream/config

      - name: Publish Actions to Pipedream
        run: |
          changed_files=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | grep '\.js$' | grep -v '\.test\.js$' || true)
          if [ -z "$changed_files" ]; then
            echo "No changed action files to publish." | tee -a $GITHUB_STEP_SUMMARY
          else
            for file in $changed_files; do
              pd publish $file
            done
            echo "Published: $changed_files" >> $GITHUB_STEP_SUMMARY
          fi
